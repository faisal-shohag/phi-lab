<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Phi Lab">
  <defs>
    <linearGradient id="phiTile" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="0.5" stop-color="#d946ef"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="16" fill="url(#phiTile)"/>
  <!-- Phi monogram: ring + vertical stem. The left stem + upper bowl also read as "P". -->
  <circle cx="32" cy="32" r="13" fill="none" stroke="#fff" stroke-width="5"/>
  <rect x="29.25" y="12" width="5.5" height="40" rx="2.75" fill="#fff"/>
</svg>
